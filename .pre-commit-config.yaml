repos:
  - repo: local
    hooks:
      - id: fmt-check
        name: cargo fmt
        entry: cargo fmt -- --check
        language: system
        pass_filenames: false
        types: [rust]

      - id: clippy
        name: cargo clippy
        entry: cargo clippy -- -D warnings
        language: system
        pass_filenames: false
        types: [rust]

      - id: cargo-deny
        name: cargo deny
        entry: cargo deny check
        language: system
        pass_filenames: false
        files: (Cargo\.(toml|lock)|deny\.toml)

      - id: licenses
        name: third-party licenses
        entry: bash -c 'cargo about generate about.hbs > THIRD-PARTY-LICENSES && git add THIRD-PARTY-LICENSES'
        language: system
        pass_filenames: false
        files: (Cargo\.(toml|lock)|about\.(toml|hbs))
