name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      checks: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy, llvm-tools-preview

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: Run tests with coverage
        run: make coverage-report

      - name: Generate test report (JUnit)
        if: always()
        run: make test-report

      - name: Publish test results
        if: always()
        uses: mikepenz/action-junit-report@v5
        with:
          report_paths: test-results.xml
          check_name: Test Results
          include_passed: true

      - name: Add coverage summary to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const data = JSON.parse(fs.readFileSync('coverage-summary.json', 'utf8'));
            const totals = data.data[0].totals;
            const files = data.data[0].files;

            const pct = (v) => v.percent.toFixed(1);
            const ratio = (v) => `${v.covered}/${v.count}`;

            let body = `## Code Coverage\n\n`;
            body += `| Metric | Coverage | Covered/Total |\n`;
            body += `|--------|----------|---------------|\n`;
            body += `| Lines | **${pct(totals.lines)}%** | ${ratio(totals.lines)} |\n`;
            body += `| Functions | **${pct(totals.functions)}%** | ${ratio(totals.functions)} |\n`;
            body += `| Regions | **${pct(totals.regions)}%** | ${ratio(totals.regions)} |\n`;
            body += `\n<details><summary>Per-file breakdown</summary>\n\n`;
            body += `| File | Lines | Functions |\n`;
            body += `|------|-------|-----------|\n`;
            for (const f of files) {
              const name = f.filename.replace(/.*\/src\//, 'src/');
              body += `| ${name} | ${pct(f.summary.lines)}% | ${pct(f.summary.functions)}% |\n`;
            }
            body += `\n</details>`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const marker = '## Code Coverage';
            const existing = comments.find(c => c.body.startsWith(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  release:
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Determine version
        id: version
        run: |
          # Read base major.minor from Cargo.toml
          BASE=$(grep -m1 '^version' Cargo.toml | sed 's/.*"\(.*\)"/\1/' | cut -d. -f1,2)
          echo "base=$BASE" >> "$GITHUB_OUTPUT"

          # Find the highest existing patch for this major.minor
          LATEST=$(git tag --list "v${BASE}.*" --sort=-v:refname | head -n1)

          if [ -z "$LATEST" ]; then
            PATCH=0
          else
            PREV_PATCH=$(echo "$LATEST" | sed "s/v${BASE}\.//")
            PATCH=$((PREV_PATCH + 1))
          fi

          VERSION="${BASE}.${PATCH}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "Releasing $VERSION"

      - name: Build release binary (amd64)
        run: cargo build --release --target x86_64-unknown-linux-gnu

      - name: Package artifacts
        run: |
          mkdir -p dist
          cp target/x86_64-unknown-linux-gnu/release/steam-proton-browser dist/
          tar czf "dist/steam-proton-browser-${{ steps.version.outputs.version }}-linux-amd64.tar.gz" \
            -C dist steam-proton-browser
          git archive --format=tar.gz --prefix="steam-proton-browser-${{ steps.version.outputs.version }}/" \
            -o "dist/steam-proton-browser-${{ steps.version.outputs.version }}-source.tar.gz" HEAD

      - name: Create tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.tag }}" -m "Release ${{ steps.version.outputs.version }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: |
            dist/steam-proton-browser-${{ steps.version.outputs.version }}-linux-amd64.tar.gz
            dist/steam-proton-browser-${{ steps.version.outputs.version }}-source.tar.gz
